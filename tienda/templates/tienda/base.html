<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mi Tienda{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcfbf9; }
        .navbar-custom {
            background-color: #2b1b54; 
            border-bottom: 3px solid #000;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'catalogo' %}">✦ Tienda en las Nubes</a>
            <div class="d-flex">
                <a href="{% url 'ver_carrito' %}" class="btn btn-light fw-bold" style="border: 2px solid #000; color: #2b1b54;">
                    🛒 Mi Carrito
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
